<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <header class="top-bar">
            <div>
                <h1>Task Manager</h1>
                <p>Gestiona tus proyectos con eficiencia</p>
            </div>
            <button id="theme-btn" class="icon-btn" title="Cambiar tema">🌙</button>
        </header>

        <main class="layout">
            <div class="content">
                <div class="card controls">
                    <form id="add-form" class="add-bar">
                        <input type="text" id="new-task" class="input" placeholder="Nueva tarea..." required>
                        <button type="submit" class="btn btn-primary">+ Add</button>
                    </form>
                    
                    <div class="filters-bar">
                        <input type="text" id="search" class="input search" placeholder="Buscar...">
                        
                        <div class="filter-group" id="filters">
                            <button data-filter="all" class="filter active">Todas</button>
                            <button data-filter="pending" class="filter">Pendientes</button>
                            <button data-filter="completed" class="filter">Listas</button>
                        </div>
                    </div>
                </div>

                <ul id="tasks" class="task-list"></ul>

                <div class="actions">
                    <button id="mark-all" class="link-btn">Marcar todas</button>
                    <button id="clear-done" class="link-btn text-danger">Borrar completadas</button>
                </div>
            </div>

            <aside id="stats" class="stats-panel"></aside>
        </main>
    </div>

    <template id="task-tpl">
        <li class="task">
            <label class="task-label">
                <input type="checkbox" class="check">
                <span class="text"></span>
            </label>
            <div class="task-actions">
                <button class="icon-btn edit">✏️</button>
                <button class="icon-btn delete">🗑️</button>
            </div>
        </li>
    </template>

    <script src="app.js"></script>
</body>
</html>
