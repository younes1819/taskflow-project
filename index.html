<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow-project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Estilo para el foco accesible */
        *:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <div class="max-w-4xl mx-auto p-4 md:p-10">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold">Task Manager</h1>
                <p class="text-slate-500 dark:text-slate-400">Gestiona tus proyectos con eficiencia</p>
            </div>
            <button id="theme-toggle" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:ring-2 ring-blue-500 transition-all" aria-label="Cambiar modo de color">
                <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
            </button>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 space-y-6">
                <section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                    <form id="todo-form" class="flex gap-2 mb-4">
                        <input type="text" id="task-input" placeholder="Nueva tarea..." required 
                            class="flex-1 p-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none text-lg">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-all">+ Add</button>
                    </form>
                    
                    <div class="flex flex-wrap gap-2 items-center justify-between">
                        <input type="text" id="search-input" placeholder="Buscar tarea..." 
                            class="p-2 rounded-md border dark:bg-slate-700 dark:border-slate-600 text-sm w-full sm:w-auto">
                        
                        <div class="flex gap-1 bg-slate-100 dark:bg-slate-700 p-1 rounded-md">
                            <button data-filter="all" class="filter-btn px-3 py-1 rounded text-sm bg-white dark:bg-slate-600 shadow-sm">Todas</button>
                            <button data-filter="pending" class="filter-btn px-3 py-1 rounded text-sm hover:bg-white/50">Pendientes</button>
                            <button data-filter="completed" class="filter-btn px-3 py-1 rounded text-sm hover:bg-white/50">Listas</button>
                        </div>
                    </div>
                </section>

                <ul id="task-list" class="space-y-3"></ul>

                <div class="flex gap-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                    <button id="mark-all" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">Marcar todas como listas</button>
                    <button id="clear-completed" class="text-sm text-red-600 dark:text-red-400 hover:underline">Borrar completadas</button>
                </div>
            </div>

            <aside id="stats-panel" class="space-y-4"></aside>
        </main>
    </div>

    <template id="task-template">
        <li class="group flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:shadow-md transition-all">
            <div class="flex items-center gap-3 flex-1">
                <input type="checkbox" class="task-checkbox w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                <span class="task-text text-lg cursor-pointer flex-1"></span>
            </div>
            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button class="edit-btn p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded text-slate-500" aria-label="Editar tarea">✏️</button>
                <button class="delete-btn p-2 hover:bg-red-50 dark:hover:bg-red-900/30 rounded text-red-500" aria-label="Eliminar tarea">🗑️</button>
            </div>
        </li>
    </template>

    <script src="app.js"></script>
</body>
</html>
